scenario_id: S6
name: "平均回帰（短期反発）"
enabled: true
enabled_markets: [US]    # JP は WF degradation -0.704 で非ロバスト
version: "1.4.0"

parameters:
  return_window: 5              # 下落判定期間（営業日）
  return_threshold: -0.10       # 下落率閾値
  trend_ma_days: 200            # 長期トレンドフィルタ
  volume_multiplier: 2.0        # 出来高倍率（売りクライマックス確認）
  rsi_period: 2                 # 短期RSI期間
  rsi_oversold: 10              # 極端な売られすぎ閾値
  take_profit_pct: 0.03         # 利確
  rsi_take_profit: 70           # RSI利確閾値（短期RSI）
  stop_loss_pct: -0.07          # ロスカット
  time_exit_days: 10            # 時間切れ（短期想定）

parameter_grid:
  return_threshold: [-0.05, -0.07, -0.10]
  rsi_oversold: [10, 15, 20]
  stop_loss_pct: [-0.03, -0.05, -0.07]
  take_profit_pct: [0.03, 0.05, 0.07]

change_log:
  - version: "1.0.0"
    date: "2026-05-20"
    reason: "初期パラメータ設定（scenarios.md推奨値採用）"
  - version: "1.1.0"
    date: "2026-05-24"
    reason: "シグナル頻度不足のため閾値緩和: return_threshold -0.10→-0.07, rsi_oversold 10→15"
  - version: "1.2.0"
    date: "2026-05-26"
    reason: "rsi_oversold 20は品質低下（追加33件の平均pnl -1.4%）のため15に戻す。return_thresholdも-0.07に戻す"
  - version: "1.3.0"
    date: "2026-05-26"
    reason: "WF推奨適用: return_threshold -0.07→-0.10(15/20), rsi_oversold 15→10(14/20), stop_loss -0.05→-0.07(14/20), take_profit 0.05→0.03(10/20)"
  - version: "1.4.0"
    date: "2026-06-01"
    reason: "enabled_markets: [US] 追加。JP WF degradation_ratio -0.704 (基準0.5未達) のため JP 除外"
