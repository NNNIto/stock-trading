scenario_id: S3
name: "押し目買い（RSI(2)＋MA200トレンド）"
enabled: false
version: "2.1.0"

parameters:
  rsi_oversold: 10              # RSI(2)売られすぎ閾値（直近3日以内に到達）
  rsi_recovery: 50              # RSI(2)回復閾値（当日）
  rsi_recovery_window: 3        # 売られすぎからの回復を判定する窓
  take_profit_pct: 0.10         # 価格利確（エントリー比）
  rsi_take_profit: 70           # RSI(2)利確閾値（過熱退出）
  stop_loss_pct: -0.07          # ロスカット
  time_exit_days: 20            # 時間切れ（短期想定）
  trend_exit_ma_days: 200       # トレンド転換判定MA

parameter_grid:
  rsi_oversold: [5, 10, 15]
  stop_loss_pct: [-0.05, -0.07, -0.10]
  take_profit_pct: [0.05, 0.10, 0.15]

change_log:
  - version: "1.0.0"
    date: "2026-05-20"
    reason: "初期パラメータ設定（scenarios.md推奨値採用）"
  - version: "1.1.0"
    date: "2026-05-26"
    reason: "再有効化試行 → 取引数増加目的"
  - version: "1.2.0"
    date: "2026-05-26"
    reason: "再無効化: 勝率21.7%・合計PnL-100%。trend_reversal出口74/92件でトレンド判定が機能していない。要パラメータ再設計"
  - version: "1.3.0"
    date: "2026-05-26"
    reason: "再設計: close>ma_200をエントリー条件追加、出口判定をma_50→ma_200変更（MA50付近エントリーでMA50割れ即出口の構造矛盾を解消）、rsi_oversold 35→30"
  - version: "1.4.0"
    date: "2026-05-26"
    reason: "再無効化: MA200設計でも勝率21.4%（改善なし）。RSI(14)押し目シグナル自体にedgeなし。要シグナル根本見直し"
  - version: "2.0.0"
    date: "2026-05-26"
    reason: "RSI(14)→RSI(2)に全面再設計（Connorsスタイル）。MA200上昇トレンド中のRSI(2)<10極端売られ過ぎ+回復50超をエントリー条件に。出口はRSI(2)>=70または価格+10%。保有期間20日に短縮"
  - version: "2.1.0"
    date: "2026-05-26"
    reason: "再無効化: rsi_2>=70の出口が翌日に到達→take_profit 455件が平均-0.24%。S6と信号が重複しS6の0件化（ポジション枠競合）。S6が既にRSI(2)+平均回帰を実装済みのため不要"
