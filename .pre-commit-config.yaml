repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports]
        additional_dependencies:
          - types-pyyaml
          - types-requests
          - polars
          - pydantic

  - repo: local
    hooks:
      - id: pytest-with-coverage
        name: pytest (coverage >= 60%)
        entry: .venv/bin/pytest tests/ --tb=short -q
        language: system
        pass_filenames: false
        always_run: true
